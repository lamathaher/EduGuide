spring.application.name=roadmap-backend

spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:roadmap_db}
spring.datasource.username=${MYSQLUSER:root}
